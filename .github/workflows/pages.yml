name: Deploy to GitHub Pages

on:
  push:
    tags: ['v*']

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - run: rsync -a --exclude=raw --exclude=docs --exclude=posetest.html --exclude=charactertest.html --exclude=README.md --exclude=CLAUDE.md --exclude=.git --exclude=.github ./ _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
