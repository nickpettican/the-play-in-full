<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☸️</text></svg>">
<title>The Play in Full</title>
<style>
  :root{
    --gold:#e8c56a; --gold-dim:#b89440; --ink:#2a1f14; --paper:#f5ecd8;
    --panel:rgba(24,18,10,.82);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Georgia,'Times New Roman',serif;color:var(--paper)}
  canvas{display:block}
  #hud{position:fixed;inset:0;pointer-events:none;user-select:none;-webkit-user-select:none}

  /* ---------- title screen ---------- */
  /* smooth multi-stop gradient (the old two-stop radial banded into a visible block) */
  #title{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse 90% 55% at 50% 72%, rgba(240,178,84,.28) 0%, rgba(196,120,58,.14) 34%, rgba(120,60,40,.05) 60%, transparent 78%),
      radial-gradient(ellipse 120% 80% at 50% 110%, rgba(150,60,70,.20) 0%, transparent 65%),
      linear-gradient(180deg, #101430 0%, #1d1731 26%, #2e1a2a 48%, #3a2016 70%, #17100a 92%, #0c0806 100%);
    z-index:40;transition:opacity 1.6s}
  #title.gone{opacity:0;pointer-events:none}
  #title h1{font-size:clamp(2.2rem,7vw,4.6rem);font-weight:normal;letter-spacing:.14em;color:var(--gold);
    text-shadow:0 0 30px rgba(232,197,106,.4),0 0 90px rgba(240,140,90,.25);margin-bottom:.4rem;text-align:center}
  #title h2{font-size:clamp(.85rem,2.2vw,1.15rem);letter-spacing:.32em;color:#d8a98e;font-style:italic;font-weight:normal;text-align:center}
  #langStep{display:none;flex-direction:row;gap:2.5rem;margin-top:.5rem}
  #langStep .charCard.off{opacity:.35;cursor:default;pointer-events:none}
  #langStep .charCard .soon,#resumeStep .charCard .soon{display:block;font-size:.62rem;letter-spacing:.18em;color:#9a8a68;margin-top:.4rem}
  #resumeStep{display:none;flex-direction:row;gap:2.5rem;margin-top:.5rem}
  #supportBtn{display:block;margin-top:1.1rem;pointer-events:auto;cursor:pointer;text-decoration:none;
    border:1px solid rgba(232,197,106,.35);background:rgba(232,197,106,.04);color:#c9b68a;
    font-size:.82rem;letter-spacing:.22em;padding:.55rem 1.8rem;transition:all .35s;text-align:center}
  #supportBtn:hover{background:rgba(232,197,106,.16);color:var(--gold)}
  #title .rule{width:180px;height:1px;margin:1.6rem 0;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  #beginBtn{pointer-events:auto;cursor:pointer;border:1px solid var(--gold-dim);background:rgba(232,197,106,.08);
    color:var(--gold);font-family:inherit;font-size:1.05rem;letter-spacing:.25em;padding:.75rem 2.6rem;transition:all .35s}
  #beginBtn:hover{background:rgba(232,197,106,.22);box-shadow:0 0 24px rgba(232,197,106,.25)}
  #charPick{display:none;flex-direction:row;gap:2.5rem;margin-top:.5rem}
  .charCard{pointer-events:auto;cursor:pointer;width:150px;padding:1.1rem .8rem;border:1px solid rgba(232,197,106,.35);
    text-align:center;transition:all .3s;background:rgba(232,197,106,.04)}
  .charCard:hover{background:rgba(232,197,106,.16);box-shadow:0 0 28px rgba(232,197,106,.2)}
  .charCard .glyph{font-size:3rem;display:block;margin-bottom:.5rem}
  .charCard .nm{letter-spacing:.2em;color:var(--gold)}
  #ctrlHint{position:absolute;bottom:4vh;width:100%;text-align:center;font-size:.78rem;letter-spacing:.12em;color:#8a795c}
  #loadNote{position:absolute;bottom:9vh;width:100%;text-align:center;font-size:.8rem;color:#6f6047;letter-spacing:.1em}

  /* ---------- act title card ---------- */
  #actCard{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#000;z-index:30;opacity:0;pointer-events:none;transition:opacity 1.4s}
  #actCard.show{opacity:1}
  #actCard .actNum{font-size:1rem;letter-spacing:.5em;color:#a08a5c;margin-bottom:1rem}
  #actCard .actName{font-size:clamp(1.6rem,5vw,3rem);letter-spacing:.18em;color:var(--gold);font-style:italic}

  /* ---------- fade veil ---------- */
  #veil{position:fixed;inset:0;background:#000;z-index:25;opacity:0;pointer-events:none;transition:opacity 1.2s}
  #veil.show{opacity:1}

  /* ---------- dialogue ---------- */
  #bubble{position:fixed;left:50%;bottom:6vh;transform:translateX(-50%);width:min(640px,92vw);
    background:var(--panel);border:1px solid rgba(232,197,106,.4);border-radius:4px;padding:1.1rem 1.4rem;
    z-index:20;display:none;pointer-events:auto;backdrop-filter:blur(6px)}
  #bubble .who{color:var(--gold);letter-spacing:.18em;font-size:.8rem;margin-bottom:.5rem;text-transform:uppercase}
  #bubble .txt{font-size:1.02rem;line-height:1.55;color:#efe6cf;min-height:2.8em}
  #bubble .src{font-size:.72rem;color:#9c8a63;font-style:italic;margin-top:.55rem}
  #bubble .next{margin-top:.7rem;text-align:right;font-size:.8rem;color:var(--gold);letter-spacing:.15em;cursor:pointer;opacity:.85}
  #bubble .next:hover{opacity:1}
  #choices{margin-top:.6rem;display:flex;flex-direction:column;gap:.4rem}
  .choice{cursor:pointer;padding:.5rem .8rem;border:1px solid rgba(232,197,106,.25);color:#e5d9ba;font-size:.92rem;
    background:rgba(232,197,106,.05);transition:all .2s}
  .choice:hover,.choice.sel{background:rgba(232,197,106,.18);border-color:var(--gold)}
  .choice.sel{box-shadow:0 0 12px rgba(232,197,106,.18) inset}

  /* ---------- rotate-device overlay (touch portrait) ---------- */
  #rotateHint{display:none;position:fixed;inset:0;z-index:50;background:rgba(9,6,3,.94);
    flex-direction:column;align-items:center;justify-content:center;gap:1rem;color:var(--gold);
    letter-spacing:.2em;font-size:1rem;text-align:center}
  #rotateHint .glyph{font-size:3rem;animation:tilt 2s ease-in-out infinite}
  @keyframes tilt{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
  @media (orientation: portrait) and (pointer: coarse){ #rotateHint{display:flex} }

  /* ---------- focus meter ---------- */
  #focusWrap{position:fixed;top:3.2vh;left:50%;transform:translateX(-50%);width:200px;z-index:20;opacity:0;transition:opacity .8s}
  #focusWrap.show{opacity:1}
  #focusWrap .lbl{text-align:center;font-size:.62rem;letter-spacing:.35em;color:#bfa972;margin-bottom:4px}
  #focusBar{height:3px;background:rgba(232,197,106,.15);border-radius:2px;overflow:hidden}
  #focusFill{height:100%;width:100%;background:linear-gradient(90deg,#b89440,#f2dc9a);transition:width .5s}

  /* ---------- mobile controls ---------- */
  #mobileUI{display:none;position:fixed;inset:0;z-index:15;pointer-events:none}
  #stick{position:absolute;left:18px;bottom:18px;width:110px;height:110px;border-radius:50%;
    border:1px solid rgba(232,197,106,.35);background:rgba(24,18,10,.25);pointer-events:auto}
  #knob{position:absolute;left:35px;top:35px;width:40px;height:40px;border-radius:50%;background:rgba(232,197,106,.4)}
  .mbtn{position:absolute;width:54px;height:54px;border-radius:50%;border:1px solid rgba(232,197,106,.4);
    background:rgba(24,18,10,.45);color:var(--gold);font-size:1.05rem;display:flex;align-items:center;justify-content:center;
    pointer-events:auto;font-family:inherit}
  /* arc anchored to the bottom-right corner, no overlaps */
  #btnAct{right:21px;bottom:50px;width:64px;height:64px;font-size:1.45rem}
  #btnJump{right:88px;bottom:16px}
  #btnSit{right:114px;bottom:70px}
  #btnBow{right:78px;bottom:120px}
  #btnBowl{right:16px;bottom:127px}

  #vignette{position:fixed;inset:0;pointer-events:none;z-index:10;
    background:radial-gradient(ellipse at center, transparent 62%, rgba(0,0,0,.42) 100%)}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="vignette"></div>
<div id="hud">
  <div id="focusWrap"><div class="lbl">MINDFULNESS</div><div id="focusBar"><div id="focusFill"></div></div></div>
</div>

<div id="bubble">
  <div class="who"></div>
  <div class="txt"></div>
  <div class="src"></div>
  <div id="choices"></div>
  <div class="next">continue&nbsp;›</div>
</div>

<div id="mobileUI">
  <div id="stick"><div id="knob"></div></div>
  <div class="mbtn" id="btnAct">💬</div>
  <div class="mbtn" id="btnJump">↥</div>
  <div class="mbtn" id="btnBow">🙏</div>
  <div class="mbtn" id="btnSit">🧘</div>
  <div class="mbtn" id="btnBowl">🍚</div>
</div>

<div id="veil"></div>
<div id="actCard"><div class="actNum"></div><div class="actName"></div></div>
<div id="rotateHint"><span class="glyph">📱</span>PLEASE TURN YOUR DEVICE</div>

<div id="title">
  <h1>The Play in Full</h1>
  <h2>a pilgrimage in twelve deeds</h2>
  <div class="rule"></div>
  <button id="beginBtn">BEGIN</button>
  <div id="langStep">
    <div class="charCard" data-l="en"><span class="nm">ENGLISH</span></div>
    <div class="charCard off" data-l="es"><span class="nm">ESPAÑOL</span><span class="soon">próximamente</span></div>
  </div>
  <div id="charPick">
    <div class="charCard" data-c="monk"><span class="nm">MONK</span></div>
    <div class="charCard" data-c="nun"><span class="nm">NUN</span></div>
  </div>
  <div id="resumeStep">
    <div class="charCard" data-r="resume"><span class="nm">CONTINUE</span><span class="soon"></span></div>
    <div class="charCard" data-r="restart"><span class="nm">START OVER</span></div>
  </div>
  <div id="loadNote"></div>
  <div id="ctrlHint">WASD move · mouse look · E talk · F bow · R bowl · Ctrl sit · Shift run · Space jump</div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
